naftiko: 1.0.0-alpha2
info:
  label: Ansible Automation Controller API — Job Templates
  description: 'Ansible Automation Controller API — Job Templates. 2 operations. Lead operation: Ansible List Job Templates.
    Self-contained Naftiko capability covering one Ansible Automation Platform business surface.'
  tags:
  - Ansible Automation Platform
  - Job Templates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ANSIBLE_AUTOMATION_PLATFORM_API_KEY: ANSIBLE_AUTOMATION_PLATFORM_API_KEY
capability:
  consumes:
  - type: http
    namespace: ansible-controller-job-templates
    baseUri: https://controller-host/api/v2
    description: Ansible Automation Controller API — Job Templates business capability. Self-contained, no shared references.
    resources:
    - name: job_templates
      path: /job_templates/
      operations:
      - name: listjobtemplates
        method: GET
        description: Ansible List Job Templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: page_size
          in: query
          type: integer
    - name: job_templates-id-launch
      path: /job_templates/{id}/launch/
      operations:
      - name: launchjobtemplate
        method: POST
        description: Ansible Launch Job Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.ANSIBLE_AUTOMATION_PLATFORM_API_KEY}}'
  exposes:
  - type: rest
    namespace: ansible-controller-job-templates-rest
    port: 8080
    description: REST adapter for Ansible Automation Controller API — Job Templates. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/job-templates
      name: job-templates
      description: REST surface for job_templates.
      operations:
      - method: GET
        name: listjobtemplates
        description: Ansible List Job Templates
        call: ansible-controller-job-templates.listjobtemplates
        with:
          page: rest.page
          page_size: rest.page_size
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/job-templates/{id}/launch
      name: job-templates-id-launch
      description: REST surface for job_templates-id-launch.
      operations:
      - method: POST
        name: launchjobtemplate
        description: Ansible Launch Job Template
        call: ansible-controller-job-templates.launchjobtemplate
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ansible-controller-job-templates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ansible Automation Controller API — Job Templates. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: ansible-list-job-templates
      description: Ansible List Job Templates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ansible-controller-job-templates.listjobtemplates
      with:
        page: tools.page
        page_size: tools.page_size
      outputParameters:
      - type: object
        mapping: $.
    - name: ansible-launch-job-template
      description: Ansible Launch Job Template
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ansible-controller-job-templates.launchjobtemplate
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
